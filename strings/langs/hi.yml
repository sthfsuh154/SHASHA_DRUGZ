sug_0: "❓**क्या आप जानते हैं?**\n\n✅ "
sug_1: "आप संगीत दो **खोज मोड** में चला सकते हैं अर्थात् डायरेक्ट मोड और इनलाइन मोड।\n\n/playmode के माध्यम से मोड बदलें"
sug_2: "आप संगीत दो **प्ले प्रकार** में चला सकते हैं अर्थात् सभी मोड और एडमिन मोड।\n\n/playmode के माध्यम से मोड बदलें"
sug_3: "आप **चैनलों** में भी संगीत चला सकते हैं।\n\n/channelplay के माध्यम से चैनल आईडी सेट करें और /cplay के माध्यम से चलाएं"
