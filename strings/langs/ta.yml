setting_5: "❖ ɢʀᴏᴜᴘ : ᴇᴛʜᴀ ɢʀᴏᴜᴘᴘɪʟ ᴋᴏᴍᴀɴᴅᴜ ᴋᴏᴅᴜᴋᴋᴀᴘᴘᴇᴛᴋᴋɪʀᴀᴛʜᴏ, ᴀɴᴛʜᴀ ɢʀᴏᴜᴘᴘɪʟ sᴀɴɢᴇᴅᴀᴛᴛᴀɪ ᴏᴛᴀᴋᴋᴜᴍ.\n\n❖ ᴄʜᴀɴɴᴇʟ : ɴɪɴɢᴀʟ ᴠᴇɴᴛᴜᴍ ᴇɴᴅʀᴀ ᴄʜᴀɴɴᴇʟʟɪʟ sᴀɴɢᴇᴅᴀᴛᴛᴀɪ ᴏᴛᴀᴋᴋᴜᴍ. /ᴄʜᴀɴɴᴇʟᴘʟᴀʏ ᴍᴜʟᴀᴍ ᴄʜᴀɴɴᴇʟ ɪᴅ ᴀɪ sᴇᴛ ᴘᴀɴɴᴜɴɢᴀʟ."
