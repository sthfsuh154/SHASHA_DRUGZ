setting_2: "❖ ᴅɪʀᴇᴄᴛ : ᴛʜᴇᴅᴀʟ ᴋᴇʟᴠɪɢᴀʟᴀɪ ɴᴇʀᴇʀᴇ ᴏᴛᴀᴋᴋᴜᴍ.\n\n❖ ɪɴʟᴀɪɴ : ᴠɪᴅᴇᴏ ᴍᴀᴛʀᴜᴍ ᴀᴜᴅɪᴏ ᴜᴋᴋᴜ ɪᴅᴀʏᴇ ᴛᴇʀɴᴛʜᴜᴅᴜᴋᴋᴀ ɪɴʟᴀɪɴ ʙᴜᴛᴛᴏɴs ᴛᴇʀᴋɪʀᴀᴛʜᴜ."
setting_3: "❖ ᴇʟʟᴏʀᴜᴍ : ɪɴᴛʜᴀ ɢʀᴏᴜᴘᴘɪʟ ɪʀᴜᴋᴋᴜᴍ ʏᴀʀᴜᴋᴋᴜᴠᴇɴᴛɪʏᴀʟᴜᴍ ᴀᴅᴍɪɴ ᴋᴏᴍᴀɴᴅᴜᴋᴀʟᴀɪ [sᴋɪᴘ, ᴘᴀᴜsᴇ, ʀᴇsᴜᴍᴇ ᴇᴅᴀ] ᴜsᴇ ᴘᴀɴɴᴀʟᴀᴀᴍ.\n\n❖ ᴀᴅᴍɪɴ ᴍᴀᴛᴛᴜᴍ : ᴀᴅᴍɪɴᴋᴀʟ ᴍᴀᴛᴛʀᴜᴍ ᴀᴅʜɪᴋᴀʀᴀᴘᴘᴇᴛᴛᴀ ᴜsᴇʀs ᴍᴀᴛᴛᴜᴍᴇ ᴀᴅᴍɪɴ ᴋᴏᴍᴀɴᴅᴜᴋᴀʟᴀɪ ᴜsᴇ ᴘᴀɴɴᴀʟᴀᴀᴍ."
