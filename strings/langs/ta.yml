#Suggestions
sug_0: "❓**ᴛʜᴇʀɪʏᴜᴍᴀ?**\n\n✅ "
sug_1: "ɴɪɴɢᴀʟ sᴀɴɢᴇᴅᴀᴛᴛᴀɪ ɪʀᴀɴᴛʜᴜ ᴛʜᴇᴅᴀʟ ᴍᴜʀᴀɪʏɪʟ ᴏᴛᴀᴋᴋᴀʟᴀᴀᴍ ᴀᴠᴀᴛʜᴜ ᴅɪʀᴇᴄᴛ ᴍᴏᴅᴇ ᴍᴀᴛʀᴜᴍ ɪɴʟᴀɪɴ ᴍᴏᴅᴇ.\n\n/ᴘʟᴀʏᴍᴏᴅᴇ ᴍᴜʟᴀᴍ ᴍᴏᴅᴇ ᴀɪ ᴍᴀᴀᴛʀᴜɴɢᴀʟ"
sug_2: "ɴɪɴɢᴀʟ sᴀɴɢᴇᴅᴀᴛᴛᴀɪ ɪʀᴀɴᴛʜᴜ ᴘʟᴀʏ ᴏʀᴀʀɪɢᴀʟɪʟ ᴏᴛᴀᴋᴋᴀʟᴀᴀᴍ ᴀᴠᴀᴛʜᴜ ᴇʟʟᴏʀᴜᴍ ᴍᴏᴅᴇ ᴍᴀᴛʀᴜᴍ ᴀᴅᴍɪɴs ᴍᴏᴅᴇ.\n\n/ᴘʟᴀʏᴍᴏᴅᴇ ᴍᴜʟᴀᴍ ᴍᴏᴅᴇ ᴀɪ ᴍᴀᴀᴛʀᴜɴɢᴀʟ"
sug_3: "ɴɪɴɢᴀʟ ᴄʜᴀɴɴᴇʟs ʟᴀᴠᴜᴍ sᴀɴɢᴇᴅᴀᴛᴛᴀɪ ᴏᴛᴀᴋᴋᴀʟᴀᴀᴍ.\n\n/ᴄʜᴀɴɴᴇʟᴘʟᴀʏ ᴍᴜʟᴀᴍ ᴄʜᴀɴɴᴇʟ_ɪᴅ sᴇᴛ ᴘᴀɴɴɪ /ᴄᴘʟᴀʏ ᴍᴜʟᴀᴍ ᴏᴛᴀᴋᴋᴜɴɢᴀʟ"
sug_4: "ᴀᴅᴍɪɴs ᴀʟʟᴀᴛʜᴀᴠᴀʀɢᴀʟᴜᴍ **ᴀᴜᴛʜ ᴜsᴇʀs ʟɪsᴛ** ʟᴀ ᴄᴇʀᴋᴋᴀᴘᴘᴇᴛᴛᴀʟ ᴀᴅᴍɪɴ ᴋᴏᴍᴀɴᴅᴜᴋᴀʟᴀɪ ᴜsᴇ ᴘᴀɴɴᴀʟᴀᴀᴍ.\nʏᴀʀᴀɪʏᴀᴠᴀᴛʜᴜ /ᴀᴜᴛʜ ᴍᴜʟᴀᴍ ᴀᴜᴛʜ ʟɪsᴛᴛɪʟ ᴄᴇʀᴋᴋᴀᴠᴜᴍ, /ᴜɴᴀᴜᴛʜ ᴍᴜʟᴀᴍ ᴛᴇᴋᴋᴀᴠᴜᴍ, /ᴀᴜᴛʜᴜsᴇʀs ᴍᴜʟᴀᴍ ᴀᴜᴛʜᴏʀɪᴢᴇᴅ ᴜsᴇʀs ᴀɪ ᴘᴀʀᴋᴋᴀᴠᴜᴍ"
sug_5: "ʙᴏᴛᴛɪʟ **ᴄʟᴇᴀɴ ᴍᴏᴅᴇ** ᴇɴɴᴜᴍ ᴛᴀʟᴀɴᴅᴜ ɪʀᴜᴋᴋᴜ.\nɪᴛʜᴜ ʙᴏᴛᴛɪɴ ᴍᴇssᴀᴊᴇɢᴀʟᴀɪ 5 ɴɪᴍɪᴛᴀᴛʜᴜᴋᴋᴀʟ ᴋᴋᴜ ᴀᴘᴘʀᴀᴍ ᴛᴇᴋᴋᴀᴠᴜᴍ ᴜɴɢᴀʟ ᴄʜᴀᴛ ᴀɪ sᴜᴛᴛᴀᴍᴀᴀᴋ ᴋᴀᴀᴘᴘᴀᴀᴛʀᴜᴠᴀᴛʜᴀᴠᴜᴍ ᴜʀᴜᴛʜɪ ᴄʜᴇʏᴋɪʀᴀᴛʜᴜ.\n\n/sᴇᴛᴛɪɴɢs ʟɪʀᴜɴᴛʜᴜ ᴄʟᴇᴀɴᴍᴏᴅᴇ ᴀɪ ᴇɴᴀʙʟᴇ ᴀʟʟᴀᴛʜᴜ ᴅɪsᴀʙʟᴇ ᴘᴀɴɴᴜɴɢᴀʟ [__ᴅᴇғᴀᴜʟᴛ ʟᴀ ᴇɴᴀʙʟᴇᴅ__]"
sug_6: "ɴɪɴɢᴀʟ **sᴘᴏᴛɪғʏ** ᴛʀᴀᴄᴋs ᴍᴀᴛʀᴜᴍ ᴘʟᴀʏʟɪsᴛs ᴀɪᴠᴜᴍ ᴏᴛᴀᴋᴋᴀʟᴀᴀᴍ.\n\n/ᴘʟᴀʏ [sᴘᴏᴛɪғʏ ʟɪɴᴋ] ᴜᴅᴀɴ ɪᴘᴘᴏᴛᴇ ᴏᴛᴀᴋᴋᴀ ᴛᴏᴅᴀɴɢᴜɴɢᴀʟ"
sug_7: "ɴɪɴɢᴀʟ **ᴀᴘᴘʟᴇ ᴍᴜsɪᴄ** ᴛʀᴀᴄᴋs ᴍᴀᴛʀᴜᴍ ᴘʟᴀʏʟɪsᴛs ᴀɪᴠᴜᴍ ᴏᴛᴀᴋᴋᴀʟᴀᴀᴍ.\n\n/ᴘʟᴀʏ [ᴀᴘᴘʟᴇ ʟɪɴᴋ] ᴜᴅᴀɴ ɪᴘᴘᴏᴛᴇ ᴏᴛᴀᴋᴋᴀ ᴛᴏᴅᴀɴɢᴜɴɢᴀʟ"
sug_8: "ɴɪɴɢᴀʟ **ʀᴇssᴏ ᴍᴜsɪᴄ** ᴛʀᴀᴄᴋs ᴍᴀᴛʀᴜᴍ ᴘʟᴀʏʟɪsᴛs ᴀɪᴠᴜᴍ ᴏᴛᴀᴋᴋᴀʟᴀᴀᴍ.\n\n/ᴘʟᴀʏ [ʀᴇssᴏ ʟɪɴᴋ] ᴜᴅᴀɴ ɪᴘᴘᴏᴛᴇ ᴏᴛᴀᴋᴋᴀ ᴛᴏᴅᴀɴɢᴜɴɢᴀʟ"
sug_9: "ɴɪɴɢᴀʟ **sᴏᴜɴᴅ ᴄʟᴏᴜᴅ** ᴛʀᴀᴄᴋs ᴍᴀᴛʀᴜᴍ ᴘʟᴀʏʟɪsᴛs ᴀɪᴠᴜᴍ ᴏᴛᴀᴋᴋᴀʟᴀᴀᴍ.\n\n/ᴘʟᴀʏ [sᴏᴜɴᴅᴄʟᴏᴜᴅ ʟɪɴᴋ] ᴜᴅᴀɴ ɪᴘᴘᴏᴛᴇ ᴏᴛᴀᴋᴋᴀ ᴛᴏᴅᴀɴɢᴜɴɢᴀʟ"
sug_10: "ɴɪɴɢᴀʟ ᴠᴏɪᴄᴇ ᴄʜᴀᴛᴛɪʟ /ᴠᴘʟᴀʏ [ᴠɪᴅᴇᴏ ᴘᴇʏᴀʀ] ᴀʟʟᴀᴛʜᴜ /ᴘʟᴀʏ -ᴠ [ᴠɪᴅᴇᴏ ᴘᴇʏᴀʀ] ᴍᴜʟᴀᴍ **ᴠɪᴅᴇᴏᴋᴀʟᴀɪ** ᴏᴛᴀᴋᴋᴀʟᴀᴀᴍ"
sug_11: "ɴɪɴɢᴀʟ ᴠᴏɪᴄᴇ ᴄʜᴀᴛᴛᴛɪɴ **ᴀᴜᴅɪᴏ ᴛʜᴀʀᴀᴍ** ᴀɪ ᴋᴜʀᴀɪᴠᴜ, ᴍᴀᴅʜɪʏᴀᴍ ᴀʟʟᴀᴛʜᴜ ᴍɪᴛᴀᴠᴀɴᴀᴍ ᴀᴀᴋ sᴇᴛ ᴘᴀɴɴᴀʟᴀᴀᴍ.\n\n/sᴇᴛᴛɪɴɢs ᴍᴜʟᴀᴍ ᴛʜᴀʀᴀᴍ ᴀɪ sᴇᴛ ᴘᴀɴɴᴜɴɢᴀʟ"
sug_12: "ɴɪɴɢᴀʟ ᴠᴏɪᴄᴇ ᴄʜᴀᴛᴛᴛɪɴ **ᴠɪᴅᴇᴏ ᴛʜᴀʀᴀᴍ** ᴀɪ ᴋᴜʀᴀɪᴠᴜ, ᴍᴀᴅʜɪʏᴀᴍ ᴀʟʟᴀᴛʜᴜ ᴍɪᴛᴀᴠᴀɴᴀᴍ ᴀᴀᴋ sᴇᴛ ᴘᴀɴɴᴀʟᴀᴀᴍ.\n\n/sᴇᴛᴛɪɴɢs ᴍᴜʟᴀᴍ ᴛʜᴀʀᴀᴍ ᴀɪ sᴇᴛ ᴘᴀɴɴᴜɴɢᴀʟ"
sug_13: "ɴɪɴɢᴀʟ ᴜɴɢᴀʟ **sᴛᴀᴛɪsᴛɪᴄs** ᴀɪ ʙᴏᴛᴛɪʟ ᴘᴀʀᴋᴋᴀʟᴀᴀᴍ, ᴇᴛʜᴏ ʟɪᴋᴇ ᴛᴏᴘ 10 ᴘʟᴀʏᴇᴅ ᴛʀᴀᴄᴋs.\n\nsᴛᴀᴛs ᴘᴇʀᴀ: /ɢsᴛᴀᴛs"
sug_14: "ɴɪɴɢᴀʟ **ɢʀᴏᴜᴘ ᴏᴅᴀ sᴛᴀᴛs** ᴀɪ ʙᴏᴛᴛɪʟ ᴘᴀʀᴋᴋᴀʟᴀᴀᴍ, ᴇᴛʜᴏ ʟɪᴋᴇ ᴛᴏᴘ 10 ᴘʟᴀʏᴇᴅ ᴛʀᴀᴄᴋs.\n\nsᴛᴀᴛs ᴘᴇʀᴀ: /ɢsᴛᴀᴛs"
sug_15: "ɴɪɴɢᴀʟ ʙᴏᴛᴛᴏᴅᴀ **ɢʟᴏʙᴀʟ sᴛᴀᴛs** ᴀɪ ᴘᴀʀᴋᴋᴀʟᴀᴀᴍ, ᴇᴛʜᴏ ʟɪᴋᴇ ᴛᴏᴘ 10 ᴜsᴇʀs, ᴛᴏᴘ 10 ᴄʜᴀᴛs, ᴛᴏᴘ 10 ᴛʀᴀᴄᴋs ᴇᴛᴄ ᴇᴛᴄ.\n\nsᴛᴀᴛs ᴘᴀʀᴋᴋᴀ: /ɢsᴛᴀᴛs"
sug_16: "ɴɪɴɢᴀʟ ɪᴘᴘᴏ ᴠᴏɪᴄᴇ ᴄʜᴀᴛᴛɪʟ ᴏᴛᴀᴋᴋᴜᴍ sᴀɴɢᴇᴅᴀᴛᴛᴀɪ ᴍʏᴜᴛ ᴘᴀɴɴᴀʟᴀᴀᴍ.\n\nᴋᴏᴍᴀɴᴅᴜ: /ᴍᴜᴛᴇ"
sug_17: "ɴɪɴɢᴀʟ ɪᴘᴘᴏ ᴠᴏɪᴄᴇ ᴄʜᴀᴛᴛɪʟ ᴏᴛᴀᴋᴋᴜᴍ sᴀɴɢᴇᴅᴀᴛᴛᴀɪ ᴀɴᴍʏᴜᴛ ᴍᴀᴛʀᴜᴍ ᴍʏᴜᴛ ᴘᴀɴɴᴀʟᴀᴀᴍ.\n\nᴋᴏᴍᴀɴᴅᴜɢᴀʟ: /ᴍᴜᴛᴇ ᴍᴀᴛʀᴜᴍ /ᴜɴᴍᴜᴛᴇ"
sug_18: "ɴɪɴɢᴀʟ ᴇɴɢᴀʟᴏᴅᴜ sᴀɴɢᴇᴅᴀᴛᴛɪɴ ᴠᴀʀᴀᴘᴀᴅᴀɢᴀʟᴀɪ ᴛʜᴇᴅᴀʟᴀᴀᴍ.\n\nᴋᴏᴍᴀɴᴅᴜ: /ʟʏʀɪᴄs [sᴀɴɢᴇᴅᴀᴍ ᴘᴇʏᴀʀ]"
sug_19: "ɴɪɴɢᴀʟ ʙᴏᴛᴛɪʟ ɪʀᴜɴᴛʜᴜ ʏᴏᴜᴛᴜʙᴇ ᴍᴜʟᴀᴍ sᴀɴɢᴇᴅᴀᴛᴛᴀɪ ᴀʟʟᴀᴛʜᴜ ᴠɪᴅᴇᴏ ᴀɪ ᴛᴀᴠᴀʀᴘᴘᴀɴɴᴀʟᴀᴀᴍ.\n\nᴋᴏᴍᴀɴᴅᴜ: /sᴏɴɢ [sᴀɴɢᴇᴅᴀᴍ ᴘᴇʏᴀʀ]"
sug_20: "ɴᴀᴀɴ ᴇᴛᴜᴘᴘᴏᴛᴜᴋᴋᴜᴍ ᴋᴏᴍᴀɴᴅᴜᴋᴀʟ ᴀᴘᴀᴛʀᴀ ᴘᴜᴛᴛᴛᴀɢᴀʟ ᴀᴛʀᴀᴋᴀ ᴛᴏᴋᴜᴛʜɪ ᴀɪ ᴘᴇʀᴀʟᴀᴀᴍ.\n\nᴋᴏᴍᴀɴᴅᴜ: /ʜᴇʟᴘ"
sug_21: "ʙᴏᴛᴛɪʟ sᴇʀᴠᴇʀ-ᴘᴜᴛᴛᴀɢᴀᴛᴛᴜ ᴘʟᴀʏʟɪsᴛ ᴏᴘᴛɪᴏɴ ɪʀᴜᴋᴋᴜ.\n\nɴɪɴɢᴀʟ ᴜɴɢᴀʟ ᴘʟᴀʏʟɪsᴛᴛɪʟ sᴀɴɢᴇᴅᴀᴛᴛᴀɪ ᴋᴜᴅᴜᴛᴛʜᴜ ᴀɴᴀɪᴛʜᴜᴛᴛᴀɪᴜᴍ ᴏʀᴜᴍᴍᴀɪʏᴀᴋᴋᴀ /ᴘʟᴀʏ ᴍᴜʟᴀᴍ ᴏᴛᴀᴋᴋᴀʟᴀᴀᴍ"
sug_22: "ɴɪɴɢᴀʟ ɪᴘᴘᴏ ʙᴏᴛᴛɪʟ ǫᴜᴇᴜᴇᴅ sᴀɴɢᴇᴅᴀᴛᴛᴜᴋᴀʟᴀɪ sʜᴜғғʟᴇ ᴘᴀɴɴᴀʟᴀᴀᴍ.\n\nᴋᴏᴍᴀɴᴅᴜ: /sʜᴜғғʟᴇ"
sug_23: "ɴɪɴɢᴀʟ sᴀɴɢᴇᴅᴀᴛᴛᴜᴋᴀʟ ᴏᴅᴀ ǫᴜᴇᴜᴇ ᴀɪ ᴘᴀʀᴋᴋᴀʟᴀᴀᴍ.\n\nᴋᴏᴍᴀɴᴅᴜ: /ǫᴜᴇᴜᴇ"
sug_24: "ɴɪɴɢᴀʟ ᴇɴɴᴀɪ ɴɪʀᴠᴀʜɪᴋᴋᴜᴍ ᴇɴ ᴜʀɪᴍᴀɪʏᴀᴀʟᴀʀ ᴍᴀᴛʀᴜᴍ sᴜᴅᴏ ᴜsᴇʀs ᴀɪ ᴘᴀʀᴋᴋᴀʟᴀᴀᴍ.\n\nᴋᴏᴍᴀɴᴅᴜ: /sᴜᴅᴏʟɪsᴛ"
sug_25: "ʙᴏᴛᴛɪʟ **ᴄᴏᴍᴍᴀɴᴅs ᴅᴇʟᴇᴛᴇ ᴍᴏᴅᴇ** ᴇɴɴᴜᴍ ᴛᴀʟᴀɴᴅᴜ ɪʀᴜᴋᴋᴜ. ɪᴛʜᴜ ᴇxᴇᴄᴜᴛᴇ ᴘᴀɴɴᴘᴘᴛᴛᴀ ᴋᴏᴍᴀɴᴅᴜᴋᴀʟᴀɪ ᴛᴀɴᴛᴇ ᴛᴇᴋᴋɪᴅᴜᴍ.\n\n/sᴇᴛᴛɪɴɢs ʟɪʀᴜɴᴛʜᴜ ᴅᴇʟᴇᴛᴇᴍᴏᴅᴇ ᴀɪ ᴇɴᴀʙʟᴇ ᴀʟʟᴀᴛʜᴜ ᴅɪsᴀʙʟᴇ ᴘᴀɴɴᴜɴɢᴀʟ [__ᴅᴇғᴀᴜʟᴛ ʟᴀ ᴇɴᴀʙʟᴇᴅ__]"
sug_26: "ɴɪɴɢᴀʟ ᴇᴀʟᴍᴀɪ ʏᴏᴠᴜɴᴀʀᴛʜɪ ʙᴏᴛᴛɪɴ ᴍᴏᴢʜɪ ᴀɪ ᴋᴀɴᴋᴀɴ ᴜʟʟᴀ ᴍᴏᴢʜɪɢᴀʟᴜᴋᴋᴜ ᴍᴀᴀᴛʀᴀʟᴀᴀᴍ.\n\nᴋᴏᴍᴀɴᴅᴜ: /ʟᴀɴɢᴜᴀɢᴇ"
sug_27: "ᴏᴛᴛɪᴋᴀᴍ ᴀᴀᴄʜᴜ 😂"
